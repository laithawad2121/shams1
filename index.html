<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Do you love me?</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none; /* تمنع تحديد النص أثناء المحاولات السريعة */
    }
    body {
      height: 100vh;
      margin: 0;
      background: linear-gradient(to bottom right, #ffe6f0, #ffccf2);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Arial', sans-serif;
      overflow: hidden;
      padding: 20px;
      text-align: center;
    }
    h1 {
      font-size: 32px;
      color: #d63384;
      margin-bottom: 40px;
      transition: 0.3s;
    }
    .buttons {
      position: relative;
      width: 100%;
      max-width: 400px;
      height: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }
    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      transition: transform 0.1s ease, background-color 0.2s, opacity 0.1s;
      touch-action: none;
    }
    #yes {
      background-color: #28a745;
      color: white;
      z-index: 10;
    }
    #no {
      background-color: #dc3545;
      color: white;
      position: relative;
      z-index: 9999; /* ليكون دائماً في الأعلى فوق كل شيء */
    }
  </style>
</head>
<body>

  <h1 id="question">Heba, Do you love me? 💖</h1>

  <div class="buttons">
    <button id="yes" onclick="celebrate()">Yes</button>
    <button id="no">No</button>
  </div>

  <script>
    const noBtn = document.getElementById('no');
    const yesBtn = document.getElementById('yes');
    const question = document.getElementById('question');
    let yesScale = 1;

    // دالة الهروب الإعجازية
    function ninjaEscape() {
      // إخفاء الزر كلياً أثناء الانتقال لكي لا تلمحه العين وهو يتحرك
      noBtn.style.opacity = '0';

      if (noBtn.style.position !== 'fixed') {
        noBtn.style.position = 'fixed';
      }

      const padding = 30;
      const maxX = window.innerWidth - noBtn.offsetWidth - padding;
      const maxY = window.innerHeight - noBtn.offsetHeight - padding;

      const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
      const randomY = Math.max(padding, Math.floor(Math.random() * maxY));
      
      // دوران عشوائي للزر لزيادة التشتيت
      const randomRotate = Math.floor(Math.random() * 60) - 30; // بين -30 و 30 درجة

      noBtn.style.left = `${randomX}px`;
      noBtn.style.top = `${randomY}px`;
      
      // تكبير زر نعم بشكل أسرع وأكبر!
      yesScale += 0.25;
      yesBtn.style.transform = `scale(${yesScale})`;

      // إعادة إظهار الزر في مكانه الجديد فوراً
      setTimeout(() => {
        noBtn.style.transform = `rotate(${randomRotate}deg)`;
        noBtn.style.opacity = '1';
      }, 50);
    }

    // خدعة تغيير الهوية: إذا لمس الزر بسرعة فائقة، يتحول النص برمجياً إلى "Yes"
    function cheatDetection() {
      noBtn.innerText = 'Yes';
      noBtn.style.backgroundColor = '#28a745';
      celebrate();
    }

    // تفعيل الهروب عند الاقتراب (للكمبيوتر)
    document.addEventListener('mousemove', (e) => {
      const rect = noBtn.getBoundingClientRect();
      const buffer = 120; // زيادة مسافة التحسس ليكون أسرع من قبل

      const distance = Math.hypot(e.clientX - (rect.left + rect.width / 2), e.clientY - (rect.top + rect.height / 2));

      if (distance < buffer) {
        ninjaEscape();
      }
    });

    // تفعيل الهروب عند اللمس (للهواتف)
    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      ninjaEscape();
    });

    noBtn.addEventListener('mouseover', ninjaEscape);

    // في حال حدوث المستحيل والضغط (نظام الحماية الأخير)
    noBtn.addEventListener('click', (e) => {
      e.preventDefault();
      cheatDetection();
    });

    // دالة الفوز الكبرى
    function celebrate() {
      alert('I love you too! 😍💖');
      document.body.style.background = '#ff3399';
      question.style.color = '#fff';
      question.innerText = 'Yay! 🎉 Mission Impossible Accomplished! 💑';
      
      // إخفاء زر لا نهائياً
      noBtn.style.display = 'none';
      yesBtn.style.transform = 'scale(1.5)';
      yesBtn.innerText = 'Forever ❤️';
    }
  </script>
</body>
</html>
